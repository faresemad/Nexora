<!-- templates/authentication/setup_2fa.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Setup 2FA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #cbd5e1;
        }

        img {
            margin-top: 20px;
            width: 250px;
            height: 250px;
            background: white;
            padding: 10px;
            border-radius: 12px;
        }

        .secret {
            margin-top: 20px;
            background: #334155;
            padding: 12px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 18px;
        }

        .manual {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }

        .button {
            margin-top: 25px;
        }

        .button a {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .button a:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Setup 2FA</h1>

    <p>
        Scan this QR code using
        Google Authenticator or Authy
    </p>

    <img
        src="data:image/png;base64,{{ qr_code }}"
        alt="2FA QR Code"
    >

    <div class="secret">
        {{ secret }}
    </div>

    <div class="manual">
        If you cannot scan the QR code,
        enter the secret manually.
    </div>

    <div class="button">
        <a href="{{ otpauth_uri }}">
            Open Authenticator
        </a>
    </div>

</div>

</body>
</html>
